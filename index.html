<!DOCTYPE html>
<html lang="pl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Licznik Dni Urodzinowych</title>
  </head>
  <body class="bg-gray-100 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-lg shadow-md w-full max-w-md">
      <h1 class="text-2xl font-bold text-primary mb-6 text-center">Kalkulator Urodzinowy</h1>
      <form id="birthdayForm" class="space-y-4">
        <div>
          <label class="block text-sm font-medium text-gray-700">Dzień urodzenia:</label>
          <input type="number" id="day" min="1" max="31" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Miesiąc urodzenia:</label>
          <input type="number" id="month" min="1" max="12" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">Rok urodzenia:</label>
          <input type="number" id="year" min="1900" max="2026" required class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-300 focus:ring focus:ring-blue-200 focus:ring-opacity-50" />
        </div>
        <button type="submit" class="w-full bg-blue-300 p-4 text-gray-800 font-semibold rounded hover:bg-blue-400 transition">Oblicz</button>
      </form>
    </div>
    <dialog id="resultDialog" class="bg-gray-200 text-red-600 p-6 rounded-lg shadow-xl relative max-w-sm w-full">
      <button id="closeDialog" class="absolute top-2 right-2 text-gray-600 hover:text-black font-bold text-xl">&times;</button>
      <div id="dialogContent" class="mt-4 space-y-2"></div>
    </dialog>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
